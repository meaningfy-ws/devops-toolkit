# Reusable workflow: Deliver source code to a target Git repository
#
# Copies src/, test/, docs/ from a Meaningfy GitHub repo to a target repo's
# branch, validates the OP-mandatory structure, and optionally tags the delivery.
#
# Designed for the OP CI/CD pipeline but generic enough for any Git-to-Git
# delivery where SSH deploy key authentication is used.
#
# Devs are responsible for OP-compliant naming and directory layout.

name: OP Delivery

on:
  workflow_call:
    inputs:
      target_repo_url:
        description: 'SSH URL of the target repository (e.g., git@bitbucket.org:project/repo.git). Not required for dry_run.'
        required: false
        default: ''
        type: string
      target_branch:
        description: 'Branch to push to on the target repository'
        required: false
        default: 'develop'
        type: string
      dry_run:
        description: 'Prepare and validate the deliverable but do not push to the target repo'
        required: false
        default: false
        type: boolean
      commit_message:
        description: 'Commit body appended after the subject line "delivery: <version>". Supports multi-line text. Use pipe (|) as line separator in workflow_dispatch UI. If empty, only the subject line is used.'
        required: false
        default: ''
        type: string
      commit_author_name:
        description: 'Git author name for delivery commits on the target repo'
        required: false
        default: 'Meaningfy CI'
        type: string
      commit_author_email:
        description: 'Git author email for delivery commits on the target repo'
        required: false
        default: 'ci@meaningfy.ws'
        type: string
      create_tag:
        description: 'Create a git tag on the target repo using the VERSION value (e.g., 2.3.0-RC.5)'
        required: false
        default: false
        type: boolean
      fortify_exclude_patterns:
        description: 'Fortify security scan exclusion patterns (one per line, creates src/filters/fortify-exclusion.properties)'
        required: false
        default: ''
        type: string
      odc_exclude_patterns:
        description: 'OWASP Dependency Check exclusion patterns (one per line, creates src/filters/odc-exclusion.properties)'
        required: false
        default: ''
        type: string
    secrets:
      SSH_DEPLOY_KEY:
        description: 'SSH private key for pushing to the target repo (not required for dry_run)'
        required: false

jobs:
  deliver:
    name: Deliver to target
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout source repo ──────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1
          path: source

      # ── 2. Read version ──────────────────────────────────────────────
      - name: Read version
        id: version
        run: |
          VERSION_PATH="source/VERSION"

          if [ ! -f "$VERSION_PATH" ]; then
            echo "::error::VERSION file not found at repo root"
            exit 1
          fi

          VERSION=$(cat "$VERSION_PATH" | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      # ── 3. Prepare deliverable tree ──────────────────────────────────
      - name: Prepare deliverable tree
        run: |
          mkdir -p deliverable

          # Copy only the three mandatory directories
          for dir in src test docs; do
            if [ -d "source/$dir" ]; then
              rsync -a "source/$dir/" "deliverable/$dir/"
              echo "Copied: $dir/"
            else
              echo "::warning::Mandatory directory not found in source: $dir/"
            fi
          done

          # Ensure VERSION ends up at src/VERSION (OP requirement 5.2.3)
          mkdir -p deliverable/src
          cp source/VERSION deliverable/src/VERSION
          echo "src/VERSION: $(cat deliverable/src/VERSION)"

          # Generate security exclusion files if patterns provided (OP requirement 5.2.4)
          # Inputs are newline-separated (one pattern per line), joined with commas for .properties format
          FORTIFY_RAW="${{ inputs.fortify_exclude_patterns }}"
          ODC_RAW="${{ inputs.odc_exclude_patterns }}"

          # Strip blank lines and join with commas
          FORTIFY=$(echo "$FORTIFY_RAW" | sed '/^\s*$/d' | paste -sd ',' -)
          ODC=$(echo "$ODC_RAW" | sed '/^\s*$/d' | paste -sd ',' -)

          if [ -n "$FORTIFY" ] || [ -n "$ODC" ]; then
            mkdir -p deliverable/src/filters
          fi

          if [ -n "$FORTIFY" ]; then
            echo "excludePatterns=$FORTIFY" > deliverable/src/filters/fortify-exclusion.properties
            echo "Generated src/filters/fortify-exclusion.properties"
          fi

          if [ -n "$ODC" ]; then
            echo "excludePatterns=$ODC" > deliverable/src/filters/odc-exclusion.properties
            echo "Generated src/filters/odc-exclusion.properties"
          fi

      # ── 4. Validate mandatory structure ──────────────────────────────
      - name: Validate OP directory structure
        run: |
          FAIL=0
          for dir in src test docs; do
            if [ ! -d "deliverable/$dir" ]; then
              echo "::error::Mandatory directory missing: $dir/"
              FAIL=1
            else
              echo "OK: $dir/"
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            echo "The OP CI/CD pipeline requires src/, test/, and docs/ directories."
            find deliverable -maxdepth 2 -type d | sort
            exit 1
          fi

      # ── 5. Upload deliverable artifact (dry run) ─────────────────────
      - name: Upload deliverable artifact
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v7
        with:
          name: op-deliverable-${{ github.event.repository.name }}-${{ steps.version.outputs.version }}
          path: deliverable/
          retention-days: 7

      # ── 6. Set up SSH ────────────────────────────────────────────────
      - name: Set up SSH
        if: ${{ !inputs.dry_run }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          TARGET_URL="${{ inputs.target_repo_url }}"
          TARGET_HOST=$(echo "$TARGET_URL" | sed -n 's|.*[/@]\([^:/]*\).*|\1|p')
          TARGET_PORT=$(echo "$TARGET_URL" | sed -n 's|.*:\([0-9]*\)/.*|\1|p')

          if [ -n "$TARGET_PORT" ] && [ "$TARGET_PORT" != "443" ]; then
            ssh-keyscan -p "$TARGET_PORT" "$TARGET_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          else
            ssh-keyscan "$TARGET_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          fi

          echo "GIT_SSH_COMMAND=ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" >> "$GITHUB_ENV"

      # ── 7. Clone target branch ───────────────────────────────────────
      - name: Clone target repo
        if: ${{ !inputs.dry_run }}
        run: |
          TARGET_URL="${{ inputs.target_repo_url }}"
          TARGET_BRANCH="${{ inputs.target_branch }}"

          git clone --depth 1 --branch "$TARGET_BRANCH" "$TARGET_URL" target

          cd target
          git config user.name "${{ inputs.commit_author_name }}"
          git config user.email "${{ inputs.commit_author_email }}"

      # ── 8. Sync deliverable and push ─────────────────────────────────
      - name: Sync and push
        id: push
        if: ${{ !inputs.dry_run }}
        run: |
          rsync -a --delete \
            --exclude '.git' \
            deliverable/ target/

          cd target

          if git diff --quiet HEAD 2>/dev/null && \
             git diff --cached --quiet 2>/dev/null && \
             [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No changes to deliver"
            echo "outcome=no_changes" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "outcome=pushed" >> "$GITHUB_OUTPUT"

          VERSION="${{ steps.version.outputs.version }}"
          CUSTOM_MSG="${{ inputs.commit_message }}"

          # Build commit message file to support multi-line body
          # Pipe characters (|) are expanded to newlines so workflow_dispatch
          # UI users can enter "line1 | line2 | line3" in a single text box.
          MSGFILE=$(mktemp)
          echo "delivery: $VERSION" > "$MSGFILE"

          if [ -n "$CUSTOM_MSG" ]; then
            echo "" >> "$MSGFILE"
            echo "$CUSTOM_MSG" | sed 's/ *| */\n/g' >> "$MSGFILE"
          fi

          TARGET_BRANCH="${{ inputs.target_branch }}"

          git add -A
          git commit -F "$MSGFILE"
          rm -f "$MSGFILE"
          git push origin "$TARGET_BRANCH"

      # ── 9. Tag the delivery (optional) ────────────────────────────
      - name: Create tag
        id: tag
        if: ${{ !inputs.dry_run && inputs.create_tag }}
        run: |
          cd target
          VERSION="${{ steps.version.outputs.version }}"

          if git ls-remote --tags origin "$VERSION" | grep -q .; then
            echo "::warning::Tag $VERSION already exists on the target repo — skipping"
            echo "outcome=Skipped (already exists): $VERSION" >> "$GITHUB_OUTPUT"
          else
            git tag "$VERSION"
            git push origin "$VERSION"
            echo "Tagged: $VERSION"
            echo "outcome=Created: $VERSION" >> "$GITHUB_OUTPUT"
          fi

      # ── 10. Summary ─────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          DRY_RUN="${{ inputs.dry_run }}"
          TARGET_BRANCH="${{ inputs.target_branch }}"
          PUSH_OUTCOME="${{ steps.push.outputs.outcome }}"
          TAG_REQUESTED="${{ inputs.create_tag }}"
          TAG_STEP_OUTCOME="${{ steps.tag.outputs.outcome }}"

          # Determine delivery status banner
          if [ "$DRY_RUN" = "true" ]; then
            BANNER="Dry run — deliverable uploaded as artifact"
          elif [ "$PUSH_OUTCOME" = "no_changes" ]; then
            BANNER="No changes detected — nothing was pushed"
          elif [ "$PUSH_OUTCOME" = "pushed" ]; then
            BANNER="Delivered to $TARGET_BRANCH"
          else
            BANNER="Delivery did not complete"
          fi

          # Determine tag outcome
          if [ "$DRY_RUN" = "true" ] || [ "$TAG_REQUESTED" != "true" ]; then
            TAG_RESULT="Not requested"
          elif [ -n "$TAG_STEP_OUTCOME" ]; then
            TAG_RESULT="$TAG_STEP_OUTCOME"
          else
            TAG_RESULT="Failed"
          fi

          echo "## OP Delivery Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> $BANNER" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Project | \`${{ github.event.repository.name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source ref | \`${{ github.ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target branch | \`$TARGET_BRANCH\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | \`$DRY_RUN\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | $TAG_RESULT |" >> "$GITHUB_STEP_SUMMARY"
